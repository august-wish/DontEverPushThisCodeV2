name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write   # TODO#0a: required to upload SARIF to GitHub Security tab
  issues: write            # TODO#0b: so Gitleaks/Sonar can comment on PRs + issues
  pull-requests: write     # TODO#0b: same as above
  id-token: write          # TODO#0c: for OIDC token
  actions: read

jobs:
    secret-scanning:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0  # TODO#1: full git history so TruffleHog can diff all commits

            - name: Run TruffleHog
              uses: trufflesecurity/trufflehog@main
              continue-on-error: true
              with:
                path: ./
                base: ${{ github.event.repository.default_branch }}  # TODO#2: base ref
                head: HEAD                                            # TODO#2: head ref
                extra_args: --only-verified                          # TODO#3: only verified secrets

            # TODO#4: Gitleaks step
            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              continue-on-error: true
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
                GITLEAKS_ENABLE_SUMMARY: true

    sast-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0  # TODO#5: full history for Sonar blame/new-code detection

            # TODO#6: SonarQube scan step
            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@v7.1.0
              continue-on-error: true
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    codeql-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        strategy:
            matrix:
                language: [ 'javascript' ]  # TODO#7: Next.js/React uses JavaScript
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                languages: ${{ matrix.language }}
                queries: security-extended,security-and-quality  # TODO#8: both suites

            # TODO#9: analyze step
            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                category: "/language:${{ matrix.language }}"

    dependency-scanning:
        runs-on: ubuntu-latest
        needs: [sast-scan, secret-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # TODO#10: set up Node 20
            - name: Setup Node 20
              uses: actions/setup-node@v4
              with:
                node-version: '20'

            # TODO#11: install npm dependencies
            - name: Install dependencies
              run: npm ci

            - name: Depcheck
              uses: dependency-check/Dependency-Check_Action@main
              continue-on-error: true
              id: Depcheck
              with:
                project: 'DontEverPushThisCodeV2'
                path: '.'
                format: 'SARIF'   # TODO#12: SARIF integrates with GitHub Security tab
                out: 'reports'
                args: >
                    --failOnCVSS 7   
                    --enableRetired
                    # TODO#13: CVSS 7.0+ = HIGH, block on HIGH and above

            # TODO#14: upload Depcheck SARIF
            - name: Upload Depcheck SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                  sarif_file: reports/dependency-check-report.sarif
                  category: dependency-check

            # TODO#15: upload raw report as artifact
            - name: Upload Depcheck HTML report as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: depcheck-report
                path: reports/

    image-scanning:
        runs-on: ubuntu-latest
        needs: [dependency-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # TODO#16: build Docker image
            - name: Build Docker image
              run: docker build -t my-app:latest .

            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              continue-on-error: true
              with:
                image-ref: 'my-app:latest'
                format: 'sarif'               # TODO#17: sarif for Security tab
                output: 'trivy-results.sarif'
                severity: 'HIGH,CRITICAL'     # TODO#18: report HIGH and CRITICAL only
                ignore-unfixed: true          # TODO#19: ignore CVEs with no fix available

            # TODO#20: upload Trivy SARIF to Security tab
            - name: Upload Trivy SARIF to Security tab
              uses: github/codeql-action/upload-sarif@v3
              if: always()
              with:
                sarif_file: trivy-results.sarif
                category: trivy

            # TODO#21: upload trivy SARIF as artifact
            - name: Upload Trivy SARIF as artifact
              uses: actions/upload-artifact@v4
              if: always()
              with:
                name: trivy-report
                path: trivy-results.sarif